# Shadowrocket: 2026-04-26 22:02:38
[General]
bypass-system = false
ipv6 = false
prefer-ipv6 = false
private-ip-answer = true
dns-direct-system = false
dns-fallback-system = true
dns-direct-fallback-proxy = false
dns-server = 1.1.1.1, 8.8.8.8
